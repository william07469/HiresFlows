<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verifying... - HiresFlows</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .container {
      text-align: center;
      padding: 40px;
    }
    
    .logo img {
      width: 120px;
      margin-bottom: 30px;
    }
    
    h1 {
      font-size: 24px;
      margin-bottom: 16px;
    }
    
    .status {
      font-size: 16px;
      color: #888;
    }
    
    .status.success {
      color: #10b981;
    }
    
    .status.error {
      color: #ef4444;
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #4f46e5;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.3s;
    }
    
    .btn:hover {
      background: #4338ca;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <a href="/">
        <img src="/logo.png" alt="HiresFlows">
      </a>
    </div>
    
    <div id="status">
      <div class="spinner"></div>
      <h1>Verifying your login...</h1>
      <p class="status">Please wait...</p>
    </div>
    
    <div id="error" style="display: none;">
      <h1>Login failed</h1>
      <p class="status error">Invalid or expired link</p>
      <a href="/login.html" class="btn">Try again</a>
    </div>
  </div>
  
  <script>
    const API_URL = window.location.origin;
    
    async function verifyToken() {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      
      if (!token) {
        showError('No token provided');
        return;
      }
      
      try {
        const res = await fetch(`${API_URL}/api/auth/verify`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token })
        });
        
        const data = await res.json();
        
        if (res.ok && data.success) {
          // Session ID'yi localStorage'a kaydet
          localStorage.setItem('sessionId', data.sessionId);
          localStorage.setItem('userEmail', data.email);
          localStorage.setItem('userId', data.userId);
          
          // Başarı mesajı göster
          showSuccess(data.email);
          
          // 2 saniye sonra ana sayfaya yönlendir
          setTimeout(() => {
            window.location.href = '/';
          }, 2000);
        } else {
          showError(data.error || 'Verification failed');
        }
      } catch (error) {
        showError('Network error. Please try again.');
      }
    }
    
    function showSuccess(email) {
      document.getElementById('status').innerHTML = `
        <h1 style="color: #10b981;">✓ Login successful!</h1>
        <p class="status success">Welcome back, ${email}</p>
        <p class="status" style="margin-top: 10px;">Redirecting...</p>
      `;
    }
    
    function showError(message) {
      document.getElementById('status').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error').querySelector('.status').textContent = message;
    }
    
    // Sayfa yüklenince doğrula
    verifyToken();
  </script>
</body>
</html>
