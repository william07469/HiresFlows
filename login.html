<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - HiresFlows</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .login-container {
      max-width: 400px;
      width: 90%;
      padding: 40px;
      background: #111;
      border-radius: 16px;
      border: 1px solid #222;
      text-align: center;
    }
    
    .logo {
      margin-bottom: 30px;
    }
    
    .logo img {
      width: 120px;
    }
    
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    .subtitle {
      color: #888;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    .tabs {
      display: flex;
      margin-bottom: 24px;
      background: #1a1a1a;
      border-radius: 8px;
      padding: 4px;
    }
    
    .tab {
      flex: 1;
      padding: 12px;
      background: transparent;
      border: none;
      color: #888;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.3s;
    }
    
    .tab.active {
      background: #6366f1;
      color: #fff;
    }
    
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #ccc;
    }
    
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      outline: none;
      transition: border-color 0.3s;
    }
    
    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #6366f1;
    }
    
    button[type="submit"] {
      width: 100%;
      padding: 16px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }
    
    button[type="submit"]:hover {
      background: #4f46e5;
    }
    
    button[type="submit"]:disabled {
      background: #333;
      cursor: not-allowed;
    }
    
    .message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
    }
    
    .message.success {
      background: #065f46;
      border: 1px solid #059669;
    }
    
    .message.error {
      background: #7f1d1d;
      border: 1px solid #dc2626;
    }
    
    .features {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 1px solid #222;
      text-align: left;
    }
    
    .features h3 {
      font-size: 14px;
      color: #888;
      margin-bottom: 16px;
    }
    
    .features ul {
      list-style: none;
    }
    
    .features li {
      padding: 8px 0;
      font-size: 14px;
      color: #ccc;
    }
    
    .features li::before {
      content: '✓ ';
      color: #10b981;
    }
    
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
      margin-right: 8px;
      vertical-align: middle;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .form {
      display: none;
    }
    
    .form.active {
      display: block;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <a href="/">
        <img src="/logo.png" alt="HiresFlows">
      </a>
    </div>
    
    <h1>Welcome</h1>
    <p class="subtitle">Sign in to optimize your CV</p>
    
    <div class="tabs">
      <button class="tab active" data-tab="login">Login</button>
      <button class="tab" data-tab="register">Register</button>
    </div>
    
    <!-- Login Form -->
    <form id="loginForm" class="form active">
      <div class="form-group">
        <label for="loginEmail">Email address</label>
        <input 
          type="email" 
          id="loginEmail" 
          name="email" 
          placeholder="you@example.com"
          required
          autocomplete="email"
        >
      </div>
      
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input 
          type="password" 
          id="loginPassword" 
          name="password" 
          placeholder="Your password"
          required
          autocomplete="current-password"
        >
      </div>
      
      <button type="submit" id="loginBtn">
        <span id="loginBtnText">Login</span>
      </button>
    </form>
    
    <!-- Register Form -->
    <form id="registerForm" class="form">
      <div class="form-group">
        <label for="registerEmail">Email address</label>
        <input 
          type="email" 
          id="registerEmail" 
          name="email" 
          placeholder="you@example.com"
          required
          autocomplete="email"
        >
      </div>
      
      <div class="form-group">
        <label for="registerPassword">Password</label>
        <input 
          type="password" 
          id="registerPassword" 
          name="password" 
          placeholder="At least 6 characters"
          required
          minlength="6"
          autocomplete="new-password"
        >
      </div>
      
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input 
          type="password" 
          id="confirmPassword" 
          name="confirmPassword" 
          placeholder="Confirm your password"
          required
          minlength="6"
          autocomplete="new-password"
        >
      </div>
      
      <button type="submit" id="registerBtn">
        <span id="registerBtnText">Create Account</span>
      </button>
    </form>
    
    <div id="message"></div>
    
    <div class="features">
      <h3>What you get:</h3>
      <ul>
        <li>3 free CV optimizations</li>
        <li>ATS keyword analysis</li>
        <li>Interview prep tools</li>
        <li>Cover letter generator</li>
      </ul>
    </div>
  </div>
  
  <script>
    const API_URL = window.location.origin;
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const loginEmailInput = document.getElementById('loginEmail');
    const loginPasswordInput = document.getElementById('loginPassword');
    const registerEmailInput = document.getElementById('registerEmail');
    const registerPasswordInput = document.getElementById('registerPassword');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const loginBtn = document.getElementById('loginBtn');
    const loginBtnText = document.getElementById('loginBtnText');
    const registerBtn = document.getElementById('registerBtn');
    const registerBtnText = document.getElementById('registerBtnText');
    const messageDiv = document.getElementById('message');
    const tabs = document.querySelectorAll('.tab');
    
    // Tab switching
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        
        const tabName = tab.getAttribute('data-tab');
        if (tabName === 'login') {
          loginForm.classList.add('active');
          registerForm.classList.remove('active');
        } else {
          loginForm.classList.remove('active');
          registerForm.classList.add('active');
        }
        
        messageDiv.innerHTML = '';
      });
    });
    
    // Login form submission
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = loginEmailInput.value.trim();
      const password = loginPasswordInput.value;
      
      if (!email || !password) return;
      
      loginBtn.disabled = true;
      loginBtnText.innerHTML = '<span class="spinner"></span> Loading...';
      messageDiv.innerHTML = '';
      
      try {
        const res = await fetch(`${API_URL}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await res.json();
        
        if (res.ok && data.success) {
          localStorage.setItem('sessionId', data.sessionId);
          localStorage.setItem('userId', data.userId);
          localStorage.setItem('userEmail', data.email);
          
          messageDiv.innerHTML = `
            <div class="message success">
              Welcome back! Redirecting...
            </div>
          `;
          
          setTimeout(() => {
            window.location.href = '/';
          }, 1000);
        } else {
          messageDiv.innerHTML = `
            <div class="message error">
              ${data.error || 'Login failed'}
            </div>
          `;
        }
      } catch (error) {
        messageDiv.innerHTML = `
          <div class="message error">
            Network error. Please try again.
          </div>
        `;
      } finally {
        loginBtn.disabled = false;
        loginBtnText.textContent = 'Login';
      }
    });
    
    // Register form submission
    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = registerEmailInput.value.trim();
      const password = registerPasswordInput.value;
      const confirmPassword = confirmPasswordInput.value;
      
      if (!email || !password || !confirmPassword) return;
      
      if (password !== confirmPassword) {
        messageDiv.innerHTML = `
          <div class="message error">
            Passwords do not match
          </div>
        `;
        return;
      }
      
      if (password.length < 6) {
        messageDiv.innerHTML = `
          <div class="message error">
            Password must be at least 6 characters
          </div>
        `;
        return;
      }
      
      registerBtn.disabled = true;
      registerBtnText.innerHTML = '<span class="spinner"></span> Loading...';
      messageDiv.innerHTML = '';
      
      try {
        const res = await fetch(`${API_URL}/api/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await res.json();
        
        if (res.ok && data.success) {
          localStorage.setItem('sessionId', data.sessionId);
          localStorage.setItem('userId', data.userId);
          localStorage.setItem('userEmail', data.email);
          
          messageDiv.innerHTML = `
            <div class="message success">
              Account created! Redirecting...
            </div>
          `;
          
          setTimeout(() => {
            window.location.href = '/';
          }, 1000);
        } else {
          messageDiv.innerHTML = `
            <div class="message error">
              ${data.error || 'Registration failed'}
            </div>
          `;
        }
      } catch (error) {
        messageDiv.innerHTML = `
          <div class="message error">
            Network error. Please try again.
          </div>
        `;
      } finally {
        registerBtn.disabled = false;
        registerBtnText.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
