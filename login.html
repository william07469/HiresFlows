<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - HiresFlows</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .login-container {
      max-width: 400px;
      width: 90%;
      padding: 40px;
      background: #111;
      border-radius: 16px;
      border: 1px solid #222;
      text-align: center;
    }
    
    .logo {
      margin-bottom: 30px;
    }
    
    .logo img {
      width: 120px;
    }
    
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    .subtitle {
      color: #888;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #ccc;
    }
    
    input[type="email"] {
      width: 100%;
      padding: 14px 16px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      outline: none;
      transition: border-color 0.3s;
    }
    
    input[type="email"]:focus {
      border-color: #6366f1;
    }
    
    button {
      width: 100%;
      padding: 16px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }
    
    button:hover {
      background: #4f46e5;
    }
    
    button:disabled {
      background: #333;
      cursor: not-allowed;
    }
    
    .message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
    }
    
    .message.success {
      background: #065f46;
      border: 1px solid #059669;
    }
    
    .message.error {
      background: #7f1d1d;
      border: 1px solid #dc2626;
    }
    
    .features {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 1px solid #222;
      text-align: left;
    }
    
    .features h3 {
      font-size: 14px;
      color: #888;
      margin-bottom: 16px;
    }
    
    .features ul {
      list-style: none;
    }
    
    .features li {
      padding: 8px 0;
      font-size: 14px;
      color: #ccc;
    }
    
    .features li::before {
      content: '✓ ';
      color: #10b981;
    }
    
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
      margin-right: 8px;
      vertical-align: middle;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .skip-link {
      display: block;
      margin-top: 20px;
      color: #6366f1;
      text-decoration: none;
      font-size: 14px;
    }
    
    .skip-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <a href="/">
        <img src="/logo.png" alt="HiresFlows">
      </a>
    </div>
    
    <h1>Welcome</h1>
    <p class="subtitle">Enter your email to get started</p>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email address</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          placeholder="you@example.com"
          required
          autocomplete="email"
        >
      </div>
      
      <button type="submit" id="submitBtn">
        <span id="btnText">Continue</span>
      </button>
    </form>
    
    <div id="message"></div>
    
    <a href="/" class="skip-link">Skip for now (3 free uses)</a>
    
    <div class="features">
      <h3>What you get:</h3>
      <ul>
        <li>3 free CV optimizations</li>
        <li>ATS keyword analysis</li>
        <li>Interview prep tools</li>
        <li>Cover letter generator</li>
      </ul>
    </div>
  </div>
  
  <script>
    const API_URL = window.location.origin;
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const messageDiv = document.getElementById('message');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = emailInput.value.trim();
      if (!email) return;
      
      // UI'ı güncelle
      submitBtn.disabled = true;
      btnText.innerHTML = '<span class="spinner"></span> Loading...';
      messageDiv.innerHTML = '';
      
      try {
        // Email'den userId oluştur (hash)
        const encoder = new TextEncoder();
        const data = encoder.encode(email);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        const userId = 'email_' + hashHex.slice(0, 16);
        
        // Session ID oluştur
        const sessionId = crypto.randomUUID();
        
        // LocalStorage'a kaydet
        localStorage.setItem('sessionId', sessionId);
        localStorage.setItem('userId', userId);
        localStorage.setItem('userEmail', email);
        
        // Başarı mesajı
        messageDiv.innerHTML = `
          <div class="message success">
            Welcome! Redirecting...
          </div>
        `;
        
        // 1 saniye sonra ana sayfaya yönlendir
        setTimeout(() => {
          window.location.href = '/';
        }, 1000);
        
      } catch (error) {
        messageDiv.innerHTML = `
          <div class="message error">
            Something went wrong. Please try again.
          </div>
        `;
        submitBtn.disabled = false;
        btnText.textContent = 'Continue';
      }
    });
  </script>
</body>
</html>
