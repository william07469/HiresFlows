<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - HiresFlows</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .login-container {
      max-width: 400px;
      width: 90%;
      padding: 40px;
      background: #111;
      border-radius: 16px;
      border: 1px solid #222;
    }
    
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .logo img {
      width: 120px;
    }
    
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      text-align: center;
    }
    
    .subtitle {
      color: #888;
      text-align: center;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #ccc;
    }
    
    input[type="email"] {
      width: 100%;
      padding: 14px 16px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      outline: none;
      transition: border-color 0.3s;
    }
    
    input[type="email"]:focus {
      border-color: #4f46e5;
    }
    
    button {
      width: 100%;
      padding: 14px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }
    
    button:hover {
      background: #4338ca;
    }
    
    button:disabled {
      background: #333;
      cursor: not-allowed;
    }
    
    .message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
    }
    
    .message.success {
      background: #065f46;
      border: 1px solid #059669;
    }
    
    .message.error {
      background: #7f1d1d;
      border: 1px solid #dc2626;
    }
    
    .debug-link {
      margin-top: 15px;
      padding: 12px;
      background: #1f2937;
      border-radius: 8px;
      font-size: 12px;
      word-break: break-all;
    }
    
    .debug-link a {
      color: #60a5fa;
      text-decoration: none;
    }
    
    .debug-link a:hover {
      text-decoration: underline;
    }
    
    .loading {
      display: none;
    }
    
    .loading.active {
      display: inline-block;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
      margin-right: 8px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <a href="/">
        <img src="/logo.png" alt="HiresFlows">
      </a>
    </div>
    
    <h1>Welcome back</h1>
    <p class="subtitle">Enter your email to receive a login link</p>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email address</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          placeholder="you@example.com"
          required
          autocomplete="email"
        >
      </div>
      
      <button type="submit" id="submitBtn">
        <span class="loading" id="loading">
          <span class="spinner"></span>
        </span>
        <span id="btnText">Send login link</span>
      </button>
    </form>
    
    <div id="message"></div>
  </div>
  
  <script>
    const API_URL = window.location.origin;
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const submitBtn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');
    const btnText = document.getElementById('btnText');
    const messageDiv = document.getElementById('message');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = emailInput.value.trim();
      if (!email) return;
      
      // UI'ı güncelle
      submitBtn.disabled = true;
      loading.classList.add('active');
      btnText.textContent = 'Sending...';
      messageDiv.innerHTML = '';
      
      try {
        const res = await fetch(`${API_URL}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        
        const data = await res.json();
        
        if (res.ok) {
          messageDiv.innerHTML = `
            <div class="message success">
              <strong>Check your email!</strong><br>
              We sent a login link to <strong>${email}</strong>
            </div>
          `;
          
          // Development'ta debug link göster
          if (data.debugLink) {
            messageDiv.innerHTML += `
              <div class="debug-link">
                <strong>Debug (dev only):</strong><br>
                <a href="${data.debugLink}" target="_blank">${data.debugLink}</a>
              </div>
            `;
          }
          
          // Form'u sıfırla
          emailInput.value = '';
        } else {
          messageDiv.innerHTML = `
            <div class="message error">
              ${data.error || 'Failed to send login link'}
            </div>
          `;
        }
      } catch (error) {
        messageDiv.innerHTML = `
          <div class="message error">
            Network error. Please try again.
          </div>
        `;
      } finally {
        submitBtn.disabled = false;
        loading.classList.remove('active');
        btnText.textContent = 'Send login link';
      }
    });
  </script>
</body>
</html>
