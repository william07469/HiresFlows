<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - HiresFlows</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      max-width: 400px;
      width: 90%;
      padding: 40px;
      background: #111;
      border-radius: 16px;
      border: 1px solid #222;
      text-align: center;
    }

    .logo {
      margin-bottom: 30px;
    }

    .logo img {
      width: 120px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #888;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .whop-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 16px 24px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
      text-decoration: none;
    }

    .whop-btn:hover {
      background: #4f46e5;
    }

    .whop-btn svg {
      width: 24px;
      height: 24px;
    }

    .features {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 1px solid #222;
      text-align: left;
    }

    .features h3 {
      font-size: 14px;
      color: #888;
      margin-bottom: 16px;
    }

    .features ul {
      list-style: none;
    }

    .features li {
      padding: 8px 0;
      font-size: 14px;
      color: #ccc;
    }

    .features li::before {
      content: '✓ ';
      color: #10b981;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="logo">
      <a href="/ico.png">
        <img src="/ico.png">
      </a>
    </div>

    <h1>Welcome</h1>
    <p class="subtitle">Sign in to optimize your CV</p>

    <a href="/api/auth/whop" class="whop-btn">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path
          d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" />
      </svg>
      Sign in with Whop
    </a>

    <div class="features">
      <h3>What you get:</h3>
      <ul>
        <li>3 free CV optimizations</li>
        <li>ATS keyword analysis</li>
        <li>Interview prep tools</li>
        <li>Cover letter generator</li>
      </ul>
    </div>
  </div>
</body>

</html>
