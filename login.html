<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - HiresFlows</title>
  <meta name="description" content="Sign in or create your HiresFlows account to optimize your CV with AI-powered tools.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #06060a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ===== Animated Background ===== */
    .bg-gradient {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .bg-gradient::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
      top: -200px;
      right: -100px;
      animation: floatBlob1 20s ease-in-out infinite;
    }

    .bg-gradient::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(139,92,246,0.12) 0%, transparent 70%);
      bottom: -150px;
      left: -100px;
      animation: floatBlob2 25s ease-in-out infinite;
    }

    @keyframes floatBlob1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(-80px, 60px) scale(1.1); }
      50% { transform: translate(40px, 120px) scale(0.9); }
      75% { transform: translate(80px, -40px) scale(1.05); }
    }

    @keyframes floatBlob2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(100px, -80px) scale(1.15); }
      66% { transform: translate(-60px, -120px) scale(0.95); }
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(99, 102, 241, 0.4);
      border-radius: 50%;
      animation: particleFloat linear infinite;
    }

    @keyframes particleFloat {
      0% {
        transform: translateY(100vh) scale(0);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh) scale(1);
        opacity: 0;
      }
    }

    /* Grid pattern */
    .grid-pattern {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: 
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, rgba(0,0,0,0.3) 0%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at center, rgba(0,0,0,0.3) 0%, transparent 70%);
    }

    /* ===== Main Container ===== */
    .auth-wrapper {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 20px;
      animation: pageEntrance 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }

    @keyframes pageEntrance {
      0% {
        opacity: 0;
        transform: translateY(40px) scale(0.95);
        filter: blur(10px);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0px);
      }
    }

    .auth-card {
      max-width: 460px;
      width: 100%;
      position: relative;
    }

    /* Glowing border effect */
    .auth-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 25px;
      padding: 1px;
      background: linear-gradient(
        135deg, 
        rgba(99,102,241,0.5) 0%, 
        rgba(139,92,246,0.2) 25%,
        rgba(99,102,241,0.0) 50%,
        rgba(139,92,246,0.2) 75%,
        rgba(99,102,241,0.5) 100%
      );
      background-size: 300% 300%;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: borderGlow 6s ease infinite;
      z-index: -1;
    }

    @keyframes borderGlow {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .auth-card-inner {
      background: rgba(12, 12, 20, 0.85);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-radius: 24px;
      padding: 48px 40px;
      border: 1px solid rgba(255,255,255,0.06);
      position: relative;
      overflow: hidden;
    }

    /* Inner glow */
    .auth-card-inner::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(99,102,241,0.6), transparent);
    }

    /* ===== Logo ===== */
    .logo {
      text-align: center;
      margin-bottom: 16px;
      animation: logoEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    }

    @keyframes logoEntrance {
      0% {
        opacity: 0;
        transform: translateY(-20px) scale(0.8);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .logo-link {
      display: inline-block;
      transition: transform 0.3s ease, filter 0.3s ease;
      position: relative;
    }

    .logo-link:hover {
      transform: scale(1.08);
      filter: brightness(1.1);
    }

    .logo-img-bg {
      width: 90px;
      height: 90px;
      border-radius: 22px;
      padding: 12px;
      background: linear-gradient(135deg, rgba(200,245,69,0.15) 0%, rgba(79,247,135,0.08) 100%);
      border: 1px solid rgba(200,245,69,0.2);
      box-shadow: 
        0 0 0 1px rgba(200,245,69,0.1),
        0 4px 20px rgba(200,245,69,0.15),
        0 8px 40px rgba(0,0,0,0.3),
        inset 0 0 30px rgba(200,245,69,0.05);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-img-bg img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 0;
    }

    .logo-link:hover .logo-img-bg {
      border-color: rgba(200,245,69,0.4);
      box-shadow: 
        0 0 0 1px rgba(200,245,69,0.2),
        0 8px 30px rgba(200,245,69,0.25),
        0 12px 50px rgba(0,0,0,0.4),
        inset 0 0 40px rgba(200,245,69,0.1);
    }

    .logo-badge {
      display: inline-block;
      margin-top: 12px;
      padding: 6px 14px;
      background: linear-gradient(135deg, rgba(200,245,69,0.12) 0%, rgba(79,247,135,0.08) 100%);
      border: 1px solid rgba(200,245,69,0.2);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      color: rgba(200,245,69,0.9);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ===== Header ===== */
    .auth-header {
      text-align: center;
      margin-bottom: 32px;
      animation: headerEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
    }

    @keyframes headerEntrance {
      0% {
        opacity: 0;
        transform: translateY(15px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .auth-header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .auth-header .subtitle {
      color: #6b7280;
      font-size: 15px;
      font-weight: 400;
    }

    /* ===== Tab Switcher ===== */
    .tabs-container {
      animation: tabsEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
    }

    @keyframes tabsEntrance {
      0% {
        opacity: 0;
        transform: translateY(15px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .tabs {
      display: flex;
      margin-bottom: 28px;
      background: rgba(255,255,255,0.04);
      border-radius: 14px;
      padding: 4px;
      position: relative;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .tab-indicator {
      position: absolute;
      top: 4px;
      left: 4px;
      width: calc(50% - 4px);
      height: calc(100% - 8px);
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 10px;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 0;
      box-shadow: 0 4px 15px rgba(99,102,241,0.3);
    }

    .tab-indicator.right {
      transform: translateX(100%);
    }

    .tab {
      flex: 1;
      padding: 13px 16px;
      background: transparent;
      border: none;
      color: #6b7280;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 10px;
      transition: color 0.4s ease;
      position: relative;
      z-index: 1;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.2px;
    }

    .tab.active {
      color: #fff;
    }

    .tab:hover:not(.active) {
      color: #9ca3af;
    }

    /* ===== Forms ===== */
    .forms-wrapper {
      position: relative;
      overflow: hidden;
      animation: formsEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
    }

    @keyframes formsEntrance {
      0% {
        opacity: 0;
        transform: translateY(15px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .form {
      display: none;
      animation: formSlideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .form.active {
      display: block;
    }

    @keyframes formSlideIn {
      0% {
        opacity: 0;
        transform: translateX(30px);
      }
      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes formSlideOut {
      0% {
        opacity: 1;
        transform: translateX(0);
      }
      100% {
        opacity: 0;
        transform: translateX(-30px);
      }
    }

    .form.slide-out {
      animation: formSlideOut 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* ===== Form Groups ===== */
    .form-group {
      margin-bottom: 22px;
      text-align: left;
      position: relative;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: #9ca3af;
      font-weight: 500;
      letter-spacing: 0.3px;
      transition: color 0.3s ease;
    }

    .form-group:focus-within label {
      color: #a5b4fc;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #4b5563;
      transition: color 0.3s ease;
      z-index: 2;
      pointer-events: none;
    }

    .input-wrapper:focus-within .input-icon {
      color: #6366f1;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 15px 16px 15px 48px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: all 0.3s ease;
      position: relative;
    }

    input[type="email"]::placeholder,
    input[type="password"]::placeholder,
    input[type="text"]::placeholder {
      color: #374151;
    }

    input[type="email"]:focus,
    input[type="password"]:focus,
    input[type="text"]:focus {
      border-color: rgba(99,102,241,0.5);
      background: rgba(99,102,241,0.05);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.1), 0 0 20px rgba(99,102,241,0.05);
    }

    /* Input validation styles */
    input:valid:not(:placeholder-shown) {
      border-color: rgba(16,185,129,0.3);
    }

    input:valid:not(:placeholder-shown):focus {
      border-color: rgba(16,185,129,0.5);
      box-shadow: 0 0 0 3px rgba(16,185,129,0.1);
    }

    /* Password toggle */
    .password-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #4b5563;
      cursor: pointer;
      padding: 4px;
      transition: color 0.3s ease;
      z-index: 2;
    }

    .password-toggle:hover {
      color: #9ca3af;
    }

    /* ===== Password Strength ===== */
    .password-strength {
      margin-top: 10px;
      display: none;
    }

    .password-strength.visible {
      display: block;
      animation: fadeInDown 0.3s ease forwards;
    }

    @keyframes fadeInDown {
      0% { opacity: 0; transform: translateY(-5px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .strength-bars {
      display: flex;
      gap: 4px;
      margin-bottom: 6px;
    }

    .strength-bar {
      flex: 1;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      transition: all 0.3s ease;
      overflow: hidden;
    }

    .strength-bar.active {
      animation: strengthFill 0.4s ease forwards;
    }

    @keyframes strengthFill {
      0% { transform: scaleX(0); transform-origin: left; }
      100% { transform: scaleX(1); transform-origin: left; }
    }

    .strength-bar.weak { background: #ef4444; }
    .strength-bar.medium { background: #f59e0b; }
    .strength-bar.strong { background: #10b981; }

    .strength-text {
      font-size: 12px;
      font-weight: 500;
    }

    .strength-text.weak { color: #ef4444; }
    .strength-text.medium { color: #f59e0b; }
    .strength-text.strong { color: #10b981; }

    /* ===== Divider ===== */
    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      gap: 16px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    }

    .divider span {
      font-size: 12px;
      color: #4b5563;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ===== Submit Button ===== */
    .submit-btn {
      width: 100%;
      padding: 16px 24px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.3px;
      margin-top: 4px;
    }

    .submit-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg, 
        transparent, 
        rgba(255,255,255,0.15), 
        transparent
      );
      transition: left 0.5s ease;
    }

    .submit-btn:hover::before {
      left: 100%;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(99,102,241,0.4);
    }

    .submit-btn:active {
      transform: translateY(0);
      box-shadow: 0 4px 15px rgba(99,102,241,0.3);
    }

    .submit-btn:disabled {
      background: rgba(255,255,255,0.06);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .submit-btn:disabled::before {
      display: none;
    }

    .btn-content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* ===== Spinner ===== */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ===== Message ===== */
    .message-container {
      margin-top: 20px;
    }

    .message {
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 14px;
      text-align: center;
      animation: messageSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 500;
    }

    @keyframes messageSlide {
      0% {
        opacity: 0;
        transform: translateY(-10px) scale(0.95);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .message.success {
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.2);
      color: #34d399;
    }

    .message.error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: #f87171;
    }

    /* ===== Features ===== */
    .features {
      margin-top: 32px;
      padding-top: 28px;
      border-top: 1px solid rgba(255,255,255,0.06);
      animation: featuresEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.7s both;
    }

    @keyframes featuresEntrance {
      0% {
        opacity: 0;
        transform: translateY(15px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .features h3 {
      font-size: 12px;
      color: #4b5563;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 600;
    }

    .features ul {
      list-style: none;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .features li {
      padding: 10px 14px;
      font-size: 13px;
      color: #9ca3af;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
      cursor: default;
      opacity: 0;
      animation: featureItem 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .features li:nth-child(1) { animation-delay: 0.8s; }
    .features li:nth-child(2) { animation-delay: 0.9s; }
    .features li:nth-child(3) { animation-delay: 1.0s; }
    .features li:nth-child(4) { animation-delay: 1.1s; }

    @keyframes featureItem {
      0% {
        opacity: 0;
        transform: translateY(10px) scale(0.95);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .features li:hover {
      background: rgba(99,102,241,0.08);
      border-color: rgba(99,102,241,0.15);
      transform: translateY(-2px);
    }

    .feature-icon {
      width: 20px;
      height: 20px;
      background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(139,92,246,0.2));
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 10px;
    }

    /* ===== Footer ===== */
    .auth-footer {
      text-align: center;
      margin-top: 28px;
      animation: footerEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1.2s both;
    }

    @keyframes footerEntrance {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    .auth-footer p {
      font-size: 13px;
      color: #4b5563;
    }

    .auth-footer a {
      color: #818cf8;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .auth-footer a:hover {
      color: #a5b4fc;
    }

    /* ===== Success Animation ===== */
    .success-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(6,6,10,0.9);
      backdrop-filter: blur(20px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .success-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .success-content {
      text-align: center;
      animation: successBounce 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes successBounce {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .success-checkmark {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #10b981, #059669);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 10px 40px rgba(16,185,129,0.3);
    }

    .success-checkmark svg {
      width: 40px;
      height: 40px;
      stroke: white;
      stroke-width: 3;
      fill: none;
      stroke-dasharray: 50;
      stroke-dashoffset: 50;
      animation: drawCheck 0.5s ease 0.3s forwards;
    }

    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }

    .success-content h2 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #fff;
    }

    .success-content p {
      color: #6b7280;
      font-size: 15px;
    }

    /* ===== Responsive ===== */
    @media (max-width: 480px) {
      .auth-card-inner {
        padding: 36px 24px;
      }

      .auth-header h1 {
        font-size: 24px;
      }

      .features ul {
        grid-template-columns: 1fr;
      }
    }

    /* ===== Hover Ripple ===== */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      transform: scale(0);
      animation: rippleEffect 0.6s ease-out forwards;
      pointer-events: none;
    }

    @keyframes rippleEffect {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    /* ===== Forgot Password ===== */
    .forgot-password {
      text-align: right;
      margin-top: -12px;
      margin-bottom: 20px;
    }

    .forgot-password a {
      font-size: 13px;
      color: #6366f1;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .forgot-password a:hover {
      color: #818cf8;
    }

    /* Terms text */
    .terms-text {
      font-size: 12px;
      color: #374151;
      text-align: center;
      margin-top: 16px;
      line-height: 1.5;
    }

    .terms-text a {
      color: #6366f1;
      text-decoration: none;
    }

    .terms-text a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-gradient"></div>
  <div class="grid-pattern"></div>
  <div class="particles" id="particles"></div>

  <!-- Success Overlay -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-content">
      <div class="success-checkmark">
        <svg viewBox="0 0 24 24">
          <polyline points="6 12 10 16 18 8"></polyline>
        </svg>
      </div>
      <h2 id="successTitle">Welcome!</h2>
      <p id="successText">Redirecting you now...</p>
    </div>
  </div>

  <!-- Main Auth Card -->
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-card-inner">
        <!-- Logo -->
        <div class="logo">
          <a href="/" class="logo-link">
            <div class="logo-img-bg">
              <img src="/logo2.png" alt="HiresFlows">
            </div>
          </a>
          <div class="logo-badge">CV Fixer</div>
        </div>

        <!-- Header -->
        <div class="auth-header">
          <h1 id="authTitle">Welcome back</h1>
          <p class="subtitle" id="authSubtitle">Sign in to optimize your CV</p>
        </div>

        <!-- Tab Switcher -->
        <div class="tabs-container">
          <div class="tabs">
            <div class="tab-indicator" id="tabIndicator"></div>
            <button class="tab active" data-tab="login" id="loginTab">Sign In</button>
            <button class="tab" data-tab="register" id="registerTab">Create Account</button>
          </div>
        </div>

        <!-- Forms -->
        <div class="forms-wrapper">
          <!-- Login Form -->
          <form id="loginForm" class="form active">
            <div class="form-group">
              <label for="loginEmail">Email address</label>
              <div class="input-wrapper">
                <span class="input-icon">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                    <path d="M22 7l-10 7L2 7"></path>
                  </svg>
                </span>
                <input 
                  type="email" 
                  id="loginEmail" 
                  name="email" 
                  placeholder="you@example.com"
                  required
                  autocomplete="email"
                >
              </div>
            </div>

            <div class="form-group">
              <label for="loginPassword">Password</label>
              <div class="input-wrapper">
                <span class="input-icon">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0110 0v4"></path>
                  </svg>
                </span>
                <input 
                  type="password" 
                  id="loginPassword" 
                  name="password" 
                  placeholder="Enter your password"
                  required
                  autocomplete="current-password"
                >
                <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </div>
            </div>

            <div class="forgot-password">
              <a href="#">Forgot password?</a>
            </div>

            <button type="submit" class="submit-btn" id="loginBtn">
              <span class="btn-content" id="loginBtnText">
                Sign In
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M5 12h14M12 5l7 7-7 7"></path>
                </svg>
              </span>
            </button>
          </form>

          <!-- Register Form -->
          <form id="registerForm" class="form">
            <div class="form-group">
              <label for="registerEmail">Email address</label>
              <div class="input-wrapper">
                <span class="input-icon">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                    <path d="M22 7l-10 7L2 7"></path>
                  </svg>
                </span>
                <input 
                  type="email" 
                  id="registerEmail" 
                  name="email" 
                  placeholder="you@example.com"
                  required
                  autocomplete="email"
                >
              </div>
            </div>

            <div class="form-group">
              <label for="registerPassword">Password</label>
              <div class="input-wrapper">
                <span class="input-icon">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0110 0v4"></path>
                  </svg>
                </span>
                <input 
                  type="password" 
                  id="registerPassword" 
                  name="password" 
                  placeholder="At least 6 characters"
                  required
                  minlength="6"
                  autocomplete="new-password"
                >
                <button type="button" class="password-toggle" onclick="togglePassword('registerPassword', this)">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </div>
              <div class="password-strength" id="passwordStrength">
                <div class="strength-bars">
                  <div class="strength-bar" id="bar1"></div>
                  <div class="strength-bar" id="bar2"></div>
                  <div class="strength-bar" id="bar3"></div>
                  <div class="strength-bar" id="bar4"></div>
                </div>
                <span class="strength-text" id="strengthText"></span>
              </div>
            </div>

            <div class="form-group">
              <label for="confirmPassword">Confirm Password</label>
              <div class="input-wrapper">
                <span class="input-icon">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                  </svg>
                </span>
                <input 
                  type="password" 
                  id="confirmPassword" 
                  name="confirmPassword" 
                  placeholder="Confirm your password"
                  required
                  minlength="6"
                  autocomplete="new-password"
                >
              </div>
            </div>

            <button type="submit" class="submit-btn" id="registerBtn">
              <span class="btn-content" id="registerBtnText">
                Create Account
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"></path>
                  <circle cx="8.5" cy="7" r="4"></circle>
                  <line x1="20" y1="8" x2="20" y2="14"></line>
                  <line x1="23" y1="11" x2="17" y2="11"></line>
                </svg>
              </span>
            </button>

            <p class="terms-text">
              By creating an account, you agree to our 
              <a href="/terms.html">Terms</a> and 
              <a href="/privacy.html">Privacy Policy</a>
            </p>
          </form>
        </div>

        <div class="message-container" id="message"></div>

        <!-- Features -->
        <div class="features">
          <h3>What you get</h3>
          <ul>
            <li>
              <span class="feature-icon">🎯</span>
              3 free CV optimizations
            </li>
            <li>
              <span class="feature-icon">📊</span>
              ATS keyword analysis
            </li>
            <li>
              <span class="feature-icon">🎤</span>
              Interview prep tools
            </li>
            <li>
              <span class="feature-icon">✉️</span>
              Cover letter generator
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ===== Particle System =====
    function createParticles() {
      const container = document.getElementById('particles');
      const count = 30;
      
      for (let i = 0; i < count; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        particle.style.left = Math.random() * 100 + '%';
        particle.style.width = (Math.random() * 3 + 1) + 'px';
        particle.style.height = particle.style.width;
        particle.style.animationDuration = (Math.random() * 15 + 10) + 's';
        particle.style.animationDelay = (Math.random() * 10) + 's';
        particle.style.opacity = Math.random() * 0.5 + 0.1;
        
        // Random colors
        const colors = [
          'rgba(99, 102, 241, 0.4)',
          'rgba(139, 92, 246, 0.3)',
          'rgba(168, 85, 247, 0.3)',
          'rgba(99, 102, 241, 0.2)'
        ];
        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
        
        container.appendChild(particle);
      }
    }
    createParticles();

    // ===== DOM Elements =====
    const API_URL = window.location.origin;
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const loginEmailInput = document.getElementById('loginEmail');
    const loginPasswordInput = document.getElementById('loginPassword');
    const registerEmailInput = document.getElementById('registerEmail');
    const registerPasswordInput = document.getElementById('registerPassword');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const loginBtn = document.getElementById('loginBtn');
    const loginBtnText = document.getElementById('loginBtnText');
    const registerBtn = document.getElementById('registerBtn');
    const registerBtnText = document.getElementById('registerBtnText');
    const messageDiv = document.getElementById('message');
    const tabs = document.querySelectorAll('.tab');
    const tabIndicator = document.getElementById('tabIndicator');
    const authTitle = document.getElementById('authTitle');
    const authSubtitle = document.getElementById('authSubtitle');
    const successOverlay = document.getElementById('successOverlay');
    const successTitle = document.getElementById('successTitle');
    const successText = document.getElementById('successText');
    const passwordStrength = document.getElementById('passwordStrength');

    // ===== Tab Switching with Animation =====
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const currentTab = document.querySelector('.tab.active');
        const tabName = tab.getAttribute('data-tab');
        
        if (currentTab === tab) return;

        // Update tab styles
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');

        // Move indicator
        if (tabName === 'register') {
          tabIndicator.classList.add('right');
        } else {
          tabIndicator.classList.remove('right');
        }

        // Animate header text
        authTitle.style.opacity = '0';
        authTitle.style.transform = 'translateY(-10px)';
        authSubtitle.style.opacity = '0';
        authSubtitle.style.transform = 'translateY(-10px)';

        setTimeout(() => {
          if (tabName === 'login') {
            authTitle.textContent = 'Welcome back';
            authSubtitle.textContent = 'Sign in to optimize your CV';
          } else {
            authTitle.textContent = 'Get started';
            authSubtitle.textContent = 'Create your free account';
          }
          authTitle.style.opacity = '1';
          authTitle.style.transform = 'translateY(0)';
          authSubtitle.style.opacity = '1';
          authSubtitle.style.transform = 'translateY(0)';
        }, 200);

        // Add transition to header elements
        authTitle.style.transition = 'all 0.3s ease';
        authSubtitle.style.transition = 'all 0.3s ease';

        // Slide forms
        const activeForm = document.querySelector('.form.active');
        activeForm.classList.add('slide-out');

        setTimeout(() => {
          activeForm.classList.remove('active', 'slide-out');
          
          if (tabName === 'login') {
            loginForm.classList.add('active');
          } else {
            registerForm.classList.add('active');
          }
        }, 300);

        messageDiv.innerHTML = '';
      });
    });

    // ===== Password Visibility Toggle =====
    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      
      btn.innerHTML = isPassword 
        ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"></path>
            <line x1="1" y1="1" x2="23" y2="23"></line>
          </svg>`
        : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>`;
    }

    // ===== Password Strength Meter =====
    registerPasswordInput.addEventListener('input', function() {
      const password = this.value;
      const bars = [
        document.getElementById('bar1'),
        document.getElementById('bar2'),
        document.getElementById('bar3'),
        document.getElementById('bar4')
      ];
      const strengthText = document.getElementById('strengthText');

      if (password.length === 0) {
        passwordStrength.classList.remove('visible');
        return;
      }

      passwordStrength.classList.add('visible');

      let strength = 0;
      if (password.length >= 6) strength++;
      if (password.length >= 10) strength++;
      if (/[A-Z]/.test(password) && /[a-z]/.test(password)) strength++;
      if (/[0-9]/.test(password) && /[^A-Za-z0-9]/.test(password)) strength++;

      // Reset bars
      bars.forEach(bar => {
        bar.className = 'strength-bar';
      });

      const levels = ['weak', 'weak', 'medium', 'strong', 'strong'];
      const labels = ['Very Weak', 'Weak', 'Fair', 'Strong', 'Very Strong'];

      for (let i = 0; i <= strength; i++) {
        bars[i].classList.add('active', levels[strength]);
      }

      strengthText.textContent = labels[strength];
      strengthText.className = 'strength-text ' + levels[strength];
    });

    // ===== Show Success Overlay =====
    function showSuccess(title, text) {
      successTitle.textContent = title;
      successText.textContent = text;
      successOverlay.classList.add('active');
    }

    // ===== Login Form =====
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = loginEmailInput.value.trim();
      const password = loginPasswordInput.value;
      
      if (!email || !password) return;
      
      loginBtn.disabled = true;
      loginBtnText.innerHTML = '<span class="spinner"></span> Signing in...';
      messageDiv.innerHTML = '';
      
      try {
        const res = await fetch(`${API_URL}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await res.json();
        
        if (res.ok && data.success) {
          localStorage.setItem('sessionId', data.sessionId);
          localStorage.setItem('userId', data.userId);
          localStorage.setItem('userEmail', data.email);
          
          showSuccess('Welcome back! 🎉', 'Redirecting you now...');
          
          setTimeout(() => {
            window.location.href = '/';
          }, 1500);
        } else {
          messageDiv.innerHTML = `
            <div class="message error">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="15" y1="9" x2="9" y2="15"></line>
                <line x1="9" y1="9" x2="15" y2="15"></line>
              </svg>
              ${data.error || 'Login failed. Please check your credentials.'}
            </div>
          `;
        }
      } catch (error) {
        messageDiv.innerHTML = `
          <div class="message error">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="8" x2="12" y2="12"></line>
              <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            Network error. Please try again.
          </div>
        `;
      } finally {
        loginBtn.disabled = false;
        loginBtnText.innerHTML = `Sign In
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"></path>
          </svg>`;
      }
    });

    // ===== Register Form =====
    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = registerEmailInput.value.trim();
      const password = registerPasswordInput.value;
      const confirmPassword = confirmPasswordInput.value;
      
      if (!email || !password || !confirmPassword) return;
      
      if (password !== confirmPassword) {
        messageDiv.innerHTML = `
          <div class="message error">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="15" y1="9" x2="9" y2="15"></line>
              <line x1="9" y1="9" x2="15" y2="15"></line>
            </svg>
            Passwords do not match
          </div>
        `;
        return;
      }
      
      if (password.length < 6) {
        messageDiv.innerHTML = `
          <div class="message error">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="8" x2="12" y2="12"></line>
              <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            Password must be at least 6 characters
          </div>
        `;
        return;
      }
      
      registerBtn.disabled = true;
      registerBtnText.innerHTML = '<span class="spinner"></span> Creating account...';
      messageDiv.innerHTML = '';
      
      try {
        const res = await fetch(`${API_URL}/api/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await res.json();
        
        if (res.ok && data.success) {
          localStorage.setItem('sessionId', data.sessionId);
          localStorage.setItem('userId', data.userId);
          localStorage.setItem('userEmail', data.email);
          
          showSuccess('Account created! 🚀', 'Setting up your workspace...');
          
          setTimeout(() => {
            window.location.href = '/';
          }, 1500);
        } else {
          messageDiv.innerHTML = `
            <div class="message error">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="15" y1="9" x2="9" y2="15"></line>
                <line x1="9" y1="9" x2="15" y2="15"></line>
              </svg>
              ${data.error || 'Registration failed'}
            </div>
          `;
        }
      } catch (error) {
        messageDiv.innerHTML = `
          <div class="message error">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="8" x2="12" y2="12"></line>
              <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            Network error. Please try again.
          </div>
        `;
      } finally {
        registerBtn.disabled = false;
        registerBtnText.innerHTML = `Create Account
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"></path>
            <circle cx="8.5" cy="7" r="4"></circle>
            <line x1="20" y1="8" x2="20" y2="14"></line>
            <line x1="23" y1="11" x2="17" y2="11"></line>
          </svg>`;
      }
    });

    // ===== Ripple Effect on Buttons =====
    document.querySelectorAll('.submit-btn').forEach(btn => {
      btn.addEventListener('click', function(e) {
        const rect = this.getBoundingClientRect();
        const ripple = document.createElement('span');
        ripple.classList.add('ripple');
        ripple.style.left = (e.clientX - rect.left) + 'px';
        ripple.style.top = (e.clientY - rect.top) + 'px';
        this.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);
      });
    });

    // ===== Input Focus Animations =====
    document.querySelectorAll('input').forEach(input => {
      input.addEventListener('focus', function() {
        this.closest('.form-group').classList.add('focused');
      });
      input.addEventListener('blur', function() {
        this.closest('.form-group').classList.remove('focused');
      });
    });
  </script>
</body>
</html>
