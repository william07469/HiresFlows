<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — HiresFlows</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090f;--s1:#0f0f18;--s2:#161622;--s3:#1e1e2d;
  --b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.1);--b3:rgba(255,255,255,.16);
  --lime:#c8f545;--lime2:#a8d930;
  --green:#4ff787;--rose:#f74f6a;--amber:#f7c24f;--sky:#4f8ef7;
  --chalk:#eeeaf8;--chalk2:#a09cb8;--chalk3:#5a5672;
  --r:8px;--r2:14px;--r3:20px;
}
body{background:var(--bg);color:var(--chalk);font-family:'Inter',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(200,245,69,.07) 0%,transparent 55%);pointer-events:none;z-index:0}

.nav{display:flex;align-items:center;justify-content:space-between;padding:20px 40px;border-bottom:1px solid var(--b1);background:rgba(9,9,15,.85);backdrop-filter:blur(14px);position:sticky;top:0;z-index:100}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;text-decoration:none;color:var(--chalk)}
.logo span{color:var(--lime)}
.nav-right{display:flex;align-items:center;gap:16px}
.btn-nav{font-size:13px;font-weight:600;padding:8px 20px;border-radius:var(--r2);background:var(--lime);border:none;color:var(--bg);cursor:pointer;font-family:'Inter',sans-serif;text-decoration:none;transition:all .25s}
.btn-nav:hover{background:var(--lime2);transform:translateY(-1px)}

.container{max-width:1200px;margin:0 auto;padding:40px 24px}

.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:32px}
.stat{background:var(--s1);border:1px solid var(--b2);border-radius:var(--r3);padding:20px;transition:all .3s}
.stat:hover{border-color:rgba(200,245,69,.15)}
.stat-value{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--lime);margin-bottom:4px}
.stat-label{font-size:11px;color:var(--chalk3);text-transform:uppercase;letter-spacing:.8px}

.card{background:var(--s1);border:1px solid var(--b2);border-radius:var(--r3);padding:24px;margin-bottom:24px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.card-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700}

.search-bar{display:flex;gap:12px;margin-bottom:20px}
.search-input{flex:1;padding:12px 16px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);color:var(--chalk);font-size:14px;font-family:'Inter',sans-serif}
.search-input:focus{outline:none;border-color:var(--lime)}
.search-input::placeholder{color:var(--chalk3)}
.filter-select{padding:12px 16px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);color:var(--chalk);font-size:14px;font-family:'Inter',sans-serif;min-width:120px}
.filter-select:focus{outline:none;border-color:var(--lime)}

.users-table{width:100%;border-collapse:collapse}
.users-table th{text-align:left;padding:12px 16px;font-size:11px;color:var(--chalk3);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--b2);font-weight:600}
.users-table td{padding:14px 16px;border-bottom:1px solid var(--b1);font-size:14px}
.users-table tr:hover{background:rgba(255,255,255,.02)}
.users-table .email{color:var(--chalk);font-weight:500}
.users-table .plan{font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px}
.plan-free{background:rgba(160,156,184,.15);color:var(--chalk2)}
.plan-starter{background:rgba(247,194,79,.15);color:var(--amber)}
.plan-pro{background:rgba(200,245,69,.15);color:var(--lime)}
.users-table .banned{color:var(--rose);font-weight:600}
.users-table .active{color:var(--green);font-weight:600}

.action-btns{display:flex;gap:8px}
.btn-action{padding:6px 12px;font-size:11px;font-weight:600;border-radius:var(--r);cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .2s}
.btn-action-change{background:var(--b3);color:var(--chalk)}
.btn-action-change:hover{background:var(--lime);color:var(--bg)}
.btn-action-ban{background:rgba(247,79,106,.15);color:var(--rose)}
.btn-action-ban:hover{background:var(--rose);color:var(--bg)}
.btn-action-reset{background:rgba(79,142,247,.15);color:var(--sky)}
.btn-action-reset:hover{background:var(--sky);color:var(--bg)}
.btn-action-delete{background:rgba(247,79,106,.15);color:var(--rose)}
.btn-action-delete:hover{background:var(--rose);color:var(--bg)}

.pagination{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:24px}
.btn-page{padding:8px 14px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);color:var(--chalk);cursor:pointer;font-size:13px;font-family:'Inter',sans-serif}
.btn-page:hover:not(:disabled){border-color:var(--lime);color:var(--lime)}
.btn-page:disabled{opacity:.4;cursor:not-allowed}
.btn-page.active{background:var(--lime);color:var(--bg);border-color:var(--lime)}

.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-content{background:var(--s1);border:1px solid var(--b2);border-radius:var(--r3);padding:28px;max-width:420px;width:90%}
.modal-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:20px}
.modal-input{width:100%;padding:12px 16px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);color:var(--chalk);font-size:14px;font-family:'Inter',sans-serif;margin-bottom:16px}
.modal-input:focus{outline:none;border-color:var(--lime)}
.modal-actions{display:flex;gap:12px;margin-top:20px}
.btn-modal{flex:1;padding:12px;border-radius:var(--r);font-size:14px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;border:none}
.btn-modal-primary{background:var(--lime);color:var(--bg)}
.btn-modal-primary:hover{background:var(--lime2)}
.btn-modal-secondary{background:var(--s2);border:1px solid var(--b3);color:var(--chalk)}
.btn-modal-secondary:hover{border-color:var(--lime);color:var(--lime)}

.loading{text-align:center;padding:40px;color:var(--chalk2)}
.error{text-align:center;padding:40px;color:var(--rose)}
.hidden{display:none}
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="logo">Hires<span>Flows</span> Admin</a>
  <div class="nav-right">
    <a href="/account.html" class="btn-nav" style="background:transparent;color:var(--chalk);border:1px solid var(--b3)">My Account</a>
    <button class="btn-nav" onclick="signOut()" style="background:transparent;color:var(--rose);border:1px solid var(--rose)">Sign Out</button>
  </div>
</nav>

<div class="container">
  <div class="stats-grid" id="statsGrid">
    <div class="stat"><div class="stat-value" id="totalUsers">-</div><div class="stat-label">Total Users</div></div>
    <div class="stat"><div class="stat-value" id="totalFixes">-</div><div class="stat-label">Total Fixes</div></div>
    <div class="stat"><div class="stat-value" id="proCount">-</div><div class="stat-label">Pro</div></div>
    <div class="stat"><div class="stat-value" id="starterCount">-</div><div class="stat-label">Starter</div></div>
    <div class="stat"><div class="stat-value" id="bannedCount">-</div><div class="stat-label">Banned</div></div>
  </div>

  <div class="card">
    <div class="card-header">
      <h2 class="card-title">Users</h2>
    </div>
    <div class="search-bar">
      <input type="text" class="search-input" id="searchInput" placeholder="Search by email or user ID...">
      <select class="filter-select" id="planFilter">
        <option value="">All Plans</option>
        <option value="free">Free</option>
        <option value="starter">Starter</option>
        <option value="pro">Pro</option>
      </select>
    </div>
    <table class="users-table">
      <thead>
        <tr>
          <th>User</th>
          <th>Plan</th>
          <th>Credits</th>
          <th>Fixes</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="usersTableBody">
        <tr><td colspan="6" class="loading">Loading...</td></tr>
      </tbody>
    </table>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<div class="modal" id="changePlanModal">
  <div class="modal-content">
    <h3 class="modal-title">Change Plan</h3>
    <input type="hidden" id="modalUserId">
    <select class="modal-input" id="modalPlan">
      <option value="free">Free (3 credits)</option>
      <option value="starter">Starter (30 credits)</option>
      <option value="pro">Pro (Unlimited)</option>
    </select>
    <div class="modal-actions">
      <button class="btn-modal btn-modal-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-modal btn-modal-primary" onclick="submitPlanChange()">Save</button>
    </div>
  </div>
</div>

<div class="modal" id="banModal">
  <div class="modal-content">
    <h3 class="modal-title" id="banModalTitle">Ban User</h3>
    <input type="hidden" id="banUserId">
    <input type="hidden" id="banCurrentStatus">
    <textarea class="modal-input" id="banReason" rows="3" placeholder="Reason for ban (optional)"></textarea>
    <div class="modal-actions">
      <button class="btn-modal btn-modal-secondary" onclick="closeBanModal()">Cancel</button>
      <button class="btn-modal btn-modal-primary" onclick="submitBan()" id="banBtn">Ban User</button>
    </div>
  </div>
</div>

<div class="modal" id="resetModal">
  <div class="modal-content">
    <h3 class="modal-title">Reset Credits</h3>
    <input type="hidden" id="resetUserId">
    <input type="number" class="modal-input" id="resetCredits" placeholder="Number of credits" value="3">
    <div class="modal-actions">
      <button class="btn-modal btn-modal-secondary" onclick="closeResetModal()">Cancel</button>
      <button class="btn-modal btn-modal-primary" onclick="submitReset()">Reset</button>
    </div>
  </div>
</div>

<div class="modal" id="deleteModal">
  <div class="modal-content">
    <h3 class="modal-title">Delete User</h3>
    <p style="color:var(--chalk2);margin-bottom:16px">This will permanently delete the user and all their data. This action cannot be undone.</p>
    <input type="hidden" id="deleteUserId">
    <div class="modal-actions">
      <button class="btn-modal btn-modal-secondary" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn-modal btn-modal-primary" style="background:var(--rose)" onclick="submitDelete()">Delete User</button>
    </div>
  </div>
</div>

<script>
let sessionId = localStorage.getItem('hf_user');
let currentPage = 1;
let searchTimeout;

async function apiCall(endpoint, options = {}) {
  const res = await fetch(endpoint, {
    ...options,
    headers: {
      'Content-Type': 'application/json',
      'x-session-id': sessionId,
      ...options.headers
    }
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error || 'API error');
  }
  return res.json();
}

async function loadStats() {
  try {
    const stats = await apiCall('/api/admin/stats');
    document.getElementById('totalUsers').textContent = stats.totalUsers || 0;
    document.getElementById('totalFixes').textContent = stats.totalFixes || 0;
    document.getElementById('proCount').textContent = stats.proCount || 0;
    document.getElementById('starterCount').textContent = stats.starterCount || 0;
    document.getElementById('bannedCount').textContent = stats.bannedCount || 0;
  } catch (e) {
    console.error('Stats error:', e);
  }
}

async function loadUsers(page = 1) {
  currentPage = page;
  const search = document.getElementById('searchInput').value;
  const plan = document.getElementById('planFilter').value;
  
  try {
    const data = await apiCall(`/api/admin/users?page=${page}&limit=20&search=${encodeURIComponent(search)}&plan=${encodeURIComponent(plan)}`);
    renderUsers(data);
  } catch (e) {
    console.error('Users error:', e);
    document.getElementById('usersTableBody').innerHTML = `<tr><td colspan="6" class="error">Failed to load users</td></tr>`;
  }
}

function renderUsers(data) {
  const tbody = document.getElementById('usersTableBody');
  if (!data.users || data.users.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" class="loading">No users found</td></tr>`;
    return;
  }
  
  tbody.innerHTML = data.users.map(u => `
    <tr>
      <td>
        <div class="email">${u.email || 'N/A'}</div>
        <div style="font-size:11px;color:var(--chalk3)">${u.id.slice(0, 20)}...</div>
      </td>
      <td><span class="plan plan-${u.plan}">${u.plan.toUpperCase()}</span></td>
      <td>${u.freeUsesLeft === Infinity ? '∞' : u.freeUsesLeft}</td>
      <td>${u.totalFixes}</td>
      <td>${u.isBanned ? '<span class="banned">Banned</span>' : '<span class="active">Active</span>'}</td>
      <td>
        <div class="action-btns">
          <button class="btn-action btn-action-change" onclick="openChangePlan('${u.id}', '${u.plan}')">Plan</button>
          <button class="btn-action btn-action-ban" onclick="openBanModal('${u.id}', ${u.isBanned})">${u.isBanned ? 'Unban' : 'Ban'}</button>
          <button class="btn-action btn-action-reset" onclick="openResetModal('${u.id}', ${u.freeUsesLeft})">Reset</button>
          <button class="btn-action btn-action-delete" onclick="openDeleteModal('${u.id}')">Delete</button>
        </div>
      </td>
    </tr>
  `).join('');
  
  const totalPages = Math.ceil(data.total / data.limit);
  const pagination = document.getElementById('pagination');
  let html = '';
  if (page > 1) html += `<button class="btn-page" onclick="loadUsers(${page - 1})">← Prev</button>`;
  for (let i = Math.max(1, page - 2); i <= Math.min(totalPages, page + 2); i++) {
    html += `<button class="btn-page ${i === page ? 'active' : ''}" onclick="loadUsers(${i})">${i}</button>`;
  }
  if (page < totalPages) html += `<button class="btn-page" onclick="loadUsers(${page + 1})">Next →</button>`;
  pagination.innerHTML = html;
}

function openChangePlan(userId, currentPlan) {
  document.getElementById('modalUserId').value = userId;
  document.getElementById('modalPlan').value = currentPlan;
  document.getElementById('changePlanModal').classList.add('show');
}

function closeModal() {
  document.getElementById('changePlanModal').classList.remove('show');
}

async function submitPlanChange() {
  const userId = document.getElementById('modalUserId').value;
  const plan = document.getElementById('modalPlan').value;
  const freeUses = plan === 'starter' ? 30 : plan === 'pro' ? 999999 : 3;
  
  try {
    await apiCall(`/api/admin/users/${userId}/plan`, {
      method: 'POST',
      body: JSON.stringify({ plan, freeUses })
    });
    closeModal();
    loadUsers(currentPage);
    loadStats();
  } catch (e) {
    alert(e.message);
  }
}

function openBanModal(userId, isBanned) {
  document.getElementById('banUserId').value = userId;
  document.getElementById('banCurrentStatus').value = isBanned;
  document.getElementById('banModalTitle').textContent = isBanned ? 'Unban User' : 'Ban User';
  document.getElementById('banBtn').textContent = isBanned ? 'Unban User' : 'Ban User';
  document.getElementById('banReason').value = '';
  document.getElementById('banModal').classList.add('show');
}

function closeBanModal() {
  document.getElementById('banModal').classList.remove('show');
}

async function submitBan() {
  const userId = document.getElementById('banUserId').value;
  const currentlyBanned = document.getElementById('banCurrentStatus').value === 'true';
  const reason = document.getElementById('banReason').value;
  
  try {
    await apiCall(`/api/admin/users/${userId}/ban`, {
      method: 'POST',
      body: JSON.stringify({ banned: !currentlyBanned, reason })
    });
    closeBanModal();
    loadUsers(currentPage);
    loadStats();
  } catch (e) {
    alert(e.message);
  }
}

function openResetModal(userId, currentCredits) {
  document.getElementById('resetUserId').value = userId;
  document.getElementById('resetCredits').value = currentCredits === Infinity ? 30 : currentCredits;
  document.getElementById('resetModal').classList.add('show');
}

function closeResetModal() {
  document.getElementById('resetModal').classList.remove('show');
}

async function submitReset() {
  const userId = document.getElementById('resetUserId').value;
  const credits = parseInt(document.getElementById('resetCredits').value);
  
  try {
    await apiCall(`/api/admin/users/${userId}/reset-credits`, {
      method: 'POST',
      body: JSON.stringify({ credits })
    });
    closeResetModal();
    loadUsers(currentPage);
  } catch (e) {
    alert(e.message);
  }
}

function openDeleteModal(userId) {
  document.getElementById('deleteUserId').value = userId;
  document.getElementById('deleteModal').classList.add('show');
}

function closeDeleteModal() {
  document.getElementById('deleteModal').classList.remove('show');
}

async function submitDelete() {
  const userId = document.getElementById('deleteUserId').value;
  
  if (!confirm('Are you sure you want to delete this user? This cannot be undone.')) return;
  
  try {
    await apiCall(`/api/admin/users/${userId}`, { method: 'DELETE' });
    closeDeleteModal();
    loadUsers(currentPage);
    loadStats();
  } catch (e) {
    alert(e.message);
  }
}

function signOut() {
  localStorage.removeItem('hf_user');
  window.location.href = '/';
}

document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => loadUsers(1), 400);
});

document.getElementById('planFilter').addEventListener('change', () => loadUsers(1));

(async () => {
  if (!sessionId) {
    window.location.href = '/login.html';
    return;
  }
  await loadStats();
  await loadUsers(1);
})();
</script>
</body>
</html>
